// Uygulama seviyesi (module-level) plugin tanımları
apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"
apply plugin: "com.google.gms.google-services"
apply plugin: "com.google.firebase.crashlytics"

// React Native ayarları (eğer özel konfigürasyona ihtiyacınız varsa)
react {
    autolinkLibrariesWithApp()
}

// İsteğe bağlı, ProGuard için kullanıyorsanız
def enableProguardInReleaseBuilds = false
def jscFlavor = 'org.webkit:android-jsc:+'

android {
    // Root build.gradle'da tanımlanan değişkenleri kullanıyoruz
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    // React Native 0.71+ ile gelen namespace özelliği
    namespace "com.istanbulcicekleri.mobileapp.istanbul_cicekleri"

    defaultConfig {
        applicationId "com.istanbulcicekleri.mobileapp.istanbul_cicekleri"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 18
        versionName "8.8"
               manifestPlaceholders = [partner:"istanbulcicekleri"]

    }

    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
        release {
            if (project.hasProperty('MYAPP_UPLOAD_STORE_FILE')) {
                storeFile file(MYAPP_UPLOAD_STORE_FILE)
                storePassword MYAPP_UPLOAD_STORE_PASSWORD
                keyAlias MYAPP_UPLOAD_KEY_ALIAS
                keyPassword MYAPP_UPLOAD_KEY_PASSWORD
            }
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            signingConfig signingConfigs.release
            minifyEnabled enableProguardInReleaseBuilds
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    // Java/Kotlin derleme hedefi (JDK 17 örneği)
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    kotlinOptions {
        jvmTarget = "17"
    }

    // Native kütüphaneleri SIKIŞTIR (Manifest'teki extractNativeLibs="true" ile birlikte 16KB uyarı sorununu atlar)
    packagingOptions {
        jniLibs {
            useLegacyPackaging = true
        }
    }
}

dependencies {
    // React Native core
    implementation("com.facebook.react:react-android")

    // Hermes kullanılıyorsa
    if (project.properties.containsKey("hermesEnabled") && project.properties["hermesEnabled"].toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }

    // Firebase örneği
    implementation platform('com.google.firebase:firebase-bom:33.1.0')
    implementation 'com.google.firebase:firebase-analytics'

    // Insider Native SDK
    implementation 'com.useinsider:insider:15.1.5'
}